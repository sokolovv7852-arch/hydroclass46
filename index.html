<script>
    // 3D модель гидропонной установки (Three.js)
    (function() {
        const container = document.getElementById('model3dContainer');
        if(!container) return;
        
        const width = container.clientWidth;
        const height = 400;
        
        // Сцена, камера, рендер
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a4d3a);
        scene.fog = new THREE.Fog(0x1a4d3a, 5, 15);
        
        const camera = new THREE.PerspectiveCamera(45, width/height, 0.1, 1000);
        camera.position.set(5, 4, 6);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, canvas: document.getElementById('hydroponicsCanvas') });
        renderer.setSize(width, height);
        renderer.shadowMap.enabled = true;
        
        // Освещение
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(3, 5, 2);
        dirLight.castShadow = true;
        scene.add(dirLight);
        const backLight = new THREE.PointLight(0x88aaff, 0.3);
        backLight.position.set(-2, 2, -3);
        scene.add(backLight);
        
        // ---- Ящик 1 (левый) ----
        const box1Geo = new THREE.BoxGeometry(1.8, 0.6, 1.8);
        const boxMat = new THREE.MeshStandardMaterial({ color: 0x2d6a4f, roughness: 0.3, metalness: 0.1 });
        const box1 = new THREE.Mesh(box1Geo, boxMat);
        box1.position.set(-1.2, -0.3, 0);
        box1.castShadow = true;
        box1.receiveShadow = true;
        scene.add(box1);
        
        // Крышка ящика 1 (чёрная с дырочками)
        const lid1Geo = new THREE.BoxGeometry(1.85, 0.08, 1.85);
        const lidMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5 });
        const lid1 = new THREE.Mesh(lid1Geo, lidMat);
        lid1.position.set(-1.2, 0.05, 0);
        lid1.castShadow = true;
        scene.add(lid1);
        
        // ---- Ящик 2 (правый) ----
        const box2 = new THREE.Mesh(box1Geo, boxMat);
        box2.position.set(1.2, -0.3, 0);
        box2.castShadow = true;
        scene.add(box2);
        
        const lid2 = new THREE.Mesh(lid1Geo, lidMat);
        lid2.position.set(1.2, 0.05, 0);
        lid2.castShadow = true;
        scene.add(lid2);
        
        // Горшки (маленькие цилиндры на крышках)
        const potGeo = new THREE.CylinderGeometry(0.12, 0.1, 0.1, 8);
        const potMat = new THREE.MeshStandardMaterial({ color: 0xc9b6a0 });
        for(let i = -0.6; i <= 0.6; i+=0.6) {
            for(let j = -0.6; j <= 0.6; j+=0.6) {
                const pot1 = new THREE.Mesh(potGeo, potMat);
                pot1.position.set(-1.2 + i, 0.12, j);
                pot1.castShadow = true;
                scene.add(pot1);
                
                const pot2 = new THREE.Mesh(potGeo, potMat);
                pot2.position.set(1.2 + i, 0.12, j);
                pot2.castShadow = true;
                scene.add(pot2);
            }
        }
        
        // Лампы (4 штуки над ящиками)
        const lampMat = new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0x442200 });
        const lampGeo = new THREE.BoxGeometry(0.4, 0.1, 0.6);
        const positions = [[-1.2, 0.8, -0.6], [-1.2, 0.8, 0.6], [1.2, 0.8, -0.6], [1.2, 0.8, 0.6]];
        positions.forEach(pos => {
            const lamp = new THREE.Mesh(lampGeo, lampMat);
            lamp.position.set(pos[0], pos[1], pos[2]);
            lamp.castShadow = true;
            scene.add(lamp);
            // Свечение
            const pointLight = new THREE.PointLight(0xffaa66, 0.4, 2);
            pointLight.position.set(pos[0], pos[1]-0.1, pos[2]);
            scene.add(pointLight);
        });
        
        // Кулеры (цилиндры сбоку)
        const fanMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.7 });
        const fanGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.1, 16);
        const fan1 = new THREE.Mesh(fanGeo, fanMat);
        fan1.position.set(-1.8, 0.1, 0.9);
        fan1.rotation.z = Math.PI/2;
        scene.add(fan1);
        
        const fan2 = new THREE.Mesh(fanGeo, fanMat);
        fan2.position.set(1.8, 0.1, 0.9);
        fan2.rotation.z = Math.PI/2;
        scene.add(fan2);
        
        const fanTop = new THREE.Mesh(fanGeo, fanMat);
        fanTop.position.set(0, 0.7, 1.2);
        fanTop.rotation.x = Math.PI/2;
        scene.add(fanTop);
        
        // Трубки от насоса (простой цилиндр)
        const tubeMat = new THREE.MeshStandardMaterial({ color: 0x55aa55 });
        const tubeGeo = new THREE.CylinderGeometry(0.08, 0.08, 1.2, 6);
        const tube = new THREE.Mesh(tubeGeo, tubeMat);
        tube.position.set(0, -0.2, 1.3);
        tube.rotation.z = 0.3;
        scene.add(tube);
        
        // Полупрозрачная вода в ящиках
        const waterMat = new THREE.MeshStandardMaterial({ color: 0x3399ff, transparent: true, opacity: 0.5 });
        const waterGeo = new THREE.BoxGeometry(1.6, 0.1, 1.6);
        const water1 = new THREE.Mesh(waterGeo, waterMat);
        water1.position.set(-1.2, -0.55, 0);
        scene.add(water1);
        const water2 = new THREE.Mesh(waterGeo, waterMat);
        water2.position.set(1.2, -0.55, 0);
        scene.add(water2);
        
        // Анимация вращения через мышь (OrbitControls)
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.enablePan = false;
        controls.target.set(0, 0.2, 0);
        
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // обновление от мыши
            renderer.render(scene, camera);
        }
        animate();
        
        // Адаптация под размер окна
        window.addEventListener('resize', () => {
            const newWidth = container.clientWidth;
            renderer.setSize(newWidth, height);
            camera.aspect = newWidth / height;
            camera.updateProjectionMatrix();
        });
    })();
</script>
